<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickSolve - Solve Anything Fast</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

header {
  padding: 20px;
  text-align: center;
  background: #1e293b;
  font-size: 24px;
  font-weight: bold;
}

.hero {
  text-align: center;
  padding: 50px 20px;
}

.hero h1 {
  font-size: 40px;
}

.search-box {
  margin-top: 20px;
}

.search-box input {
  padding: 12px;
  width: 60%;
  border-radius: 8px;
  border: none;
}

.tools {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  padding: 40px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  text-align: center;
  transition: 0.3s;
}

.card:hover {
  background: #334155;
  transform: scale(1.05);
}

.card a {
  color: white;
  text-decoration: none;
  font-size: 18px;
}

footer {
  text-align: center;
  padding: 20px;
  background: #1e293b;
}
</style>
</head>

<body>

<header>
  QuickSolve ⚡
</header>

<section class="hero">
  <h1>Solve Your Daily Problems Instantly</h1>
  <p>Tools, Calculators, and Smart Solutions — All in One Place</p>

  <div class="search-box">
    <input type="text" placeholder="Search tools...">
  </div>
</section>

<section class="tools">

  <div class="card">
    <a href="age.html">Age Calculator</a>
  </div>

  <div class="card">
    <a href="emi.html">EMI Calculator</a>
  </div>

  <div class="card">
    <a href="word.html">Word Counter</a>
  </div>

</section>

<footer>
  © 2026 QuickSolve | Built for Daily Use
</footer>

</body>
  </html>
